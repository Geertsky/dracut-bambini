package:
  name: libiconv
  version: "1.18"

source:
  url: https://ftp.gnu.org/pub/gnu/libiconv/libiconv-1.18.tar.gz
  sha256: 3b08f5f4f9b4eb82f151a7040bfd6fe6c6fb922efe4b1659c66ea933276965e8

build:
  number: 0
  skip: true # [not unix]

requirements:
  build:
    - {{ compiler('c') }}
    - python

test:
  commands:
    - iconv --help

about:
  home: https://www.gnu.org/software/libiconv/
  summary: This library provides an iconv() implementation, for use on systems which don't have one, or whose implementation cannot convert from/to Unicode.
  license: GPL AND LGPL
  license_file:
    - COPYING

extra:
  recipe-maintainers:
    - Geertsky
